  <body class="contact-page">
    <header class="site-header dark" data-header>
      <a class="brand" href="/">RM</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">Meniu</button>
      <nav class="main-nav" id="main-nav" aria-label="Navigație principală">
        <a href="/#servicii">Cu ce ne ocupăm</a>
        <a href="/#pachete">Ofertele noastre</a>
        <a href="/#despre-noi">Cine suntem</a>
        <a href="/portofoliu">Portofoliu</a>
        <a href="/#contact">Contact</a>
      </nav>
      <a class="nav-cta" href="https://wa.me/40732775601" target="_blank" rel="noopener">Contactați-ne</a>
    </header>

    <main class="contact-layout">
      <form class="contact-form" id="formular" action="https://formsubmit.co/contact@realtymedia.ro" method="POST">
        <input type="hidden" name="_subject" value="Cerere nouă Realty Media">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://www.realtymedia.ro/contact.html?sent=true">
        <input type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" class="form-honey">
        <label class="form-field">
          Nume
          <input name="name" type="text" placeholder="Numele tău" required>
        </label>
        <label class="form-field">
          E-mail
          <input name="email" type="email" placeholder="e-mail@exemplu.ro" required>
        </label>
        <label class="form-field">
          Telefon
          <input name="phone" type="tel" placeholder="+40 ...">
        </label>
        <label class="form-field">
          Tip proprietate
          <select name="property">
            <option>Apartament Airbnb</option>
            <option>Casă / vilă</option>
            <option>Cabană</option>
            <option>Mai multe proprietăți</option>
          </select>
        </label>
        <label class="form-field form-field-wide">
          Mesaj
          <textarea name="message" rows="3" placeholder="Spune-ne unde este proprietatea și ce ai vrea să îmbunătățești."></textarea>
        </label>
        <button class="button button-gold" type="submit">Trimite cererea</button>
      </form>
    </main>

    <footer class="site-footer dark-footer">
      <div class="footer-legal">
        <p>Realty Media Romania parte din Mint Studios Agency SRL.</p>
        <p>© 2026 Mint Studios Agency SRL. All Rights Reserved.</p>
      </div>
      <div class="footer-contact">
        <p><a href="mailto:contact@realtymedia.ro">contact@realtymedia.ro</a><a href="tel:+40732775601">+40 732 775 601</a></p>
        <p>Cluj-Napoca, România</p>
      </div>
    </footer>

    <script src="script.js?v=20260615-4"></script>
  </body>
